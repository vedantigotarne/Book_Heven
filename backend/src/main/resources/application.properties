# ── Server ────────────────────────────────────────────────────────
# The port is supplied by the Replit artifact workflow (PORT env var).
# Spring Boot also reads SERVER_PORT, but we use the explicit binding below.
server.port=${PORT:8080}

# All controllers are mounted under /api so the reverse proxy can route
# requests from the /api path directly to this service.
server.servlet.context-path=/api

# ── Database ───────────────────────────────────────────────────────
# Using Replit's built-in PostgreSQL (already provisioned — no setup needed).
# To switch to MySQL, replace the driver and URL format:
#   spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#   spring.datasource.url=jdbc:mysql://localhost:3306/bookstore_db?useSSL=false&serverTimezone=UTC
#   spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:bookstore_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=

# ── JPA / Hibernate ────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=false

# ── Jackson ───────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.bookhaven=INFO
logging.level.org.springframework.security=WARN
