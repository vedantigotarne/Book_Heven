kind = "web"
previewPath = "/"
title = "Book Haven Bookstore"
version = "1.0.0"
id = "artifacts/bookstore"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19990

[services.development]
run = "pnpm --filter @workspace/bookstore run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bookstore", "run", "build" ]
serve = "static"
publicDir = "artifacts/bookstore/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19990"
BASE_PATH = "/"
